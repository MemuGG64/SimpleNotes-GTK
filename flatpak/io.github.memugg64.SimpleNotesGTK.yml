app-id: io.github.memugg64.SimpleNotesGTK
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: simplenotes-gtk
finish-args:
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  - --filesystem=home
modules:
  - name: simplenotes-gtk
    buildsystem: simple
    build-commands:
      - install -Dm755 SimpleNotes.py /app/SimpleNotes.py
      - install -Dm644 src/*.py -t /app/src/
      - install -Dm644 resources/styles.css /app/resources/styles.css
      - install -Dm644 resources/io.github.memugg64.SimpleNotesGTK.desktop /app/share/applications/io.github.memugg64.SimpleNotesGTK.desktop
      - install -Dm644 resources/io.github.memugg64.SimpleNotesGTK.png /app/share/icons/hicolor/256x256/apps/io.github.memugg64.SimpleNotesGTK.png
      - install -Dm755 flatpak/simplenotes-gtk.sh /app/bin/simplenotes-gtk
    sources:
      - type: dir
        path: ..
